[pytest]
testpaths = src/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Parallel execution via pytest-xdist (multiple processes, not threads)
# Use `pytest -n auto` for automatic CPU detection or `-n 4` for 4 workers
# Override with: make tests ARGS="-n 8"
addopts = -n auto --dist loadgroup -q
